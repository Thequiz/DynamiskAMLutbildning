name: Uppdatera Utbildningsinnehåll

on:
  schedule:
    # Kör varje måndag kl 06:00 UTC (07:00 svensk tid)
    - cron: '0 6 * * 1'
  workflow_dispatch:  # Tillåt manuell körning

jobs:
  generate-content:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: Generate quiz content
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python generate_content.py
      
      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add data/quiz_data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Automatisk uppdatering av utbildningsinnehåll [$(date +'%Y-%m-%d')]" && git push)
